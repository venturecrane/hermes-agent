name: SMD overlay tests

on:
  push:
    branches: [main]
    paths:
      - 'smd/**'
      - '.github/workflows/smd-overlay-tests.yml'
  pull_request:
    paths:
      - 'smd/**'
      - '.github/workflows/smd-overlay-tests.yml'

permissions:
  contents: read

jobs:
  smd-overlay-tests:
    name: smd/tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run smd/tests
        # pytest exit code 5 == "no tests collected", which is the
        # expected state while the overlay is scaffolding-only. Treat 5
        # as success; bubble everything else.
        run: |
          set +e
          python -m pytest smd/tests -q
          code=$?
          if [ "$code" -eq 0 ] || [ "$code" -eq 5 ]; then
            echo "::notice ::pytest exit $code (0=passed, 5=no tests collected). OK."
            exit 0
          fi
          exit "$code"
